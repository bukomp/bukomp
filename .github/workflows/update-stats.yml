name: Update README stats

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          FOLLOWERS=$(gh api "/users/$OWNER" --jq '.followers')
          CREATED=$(gh api "/users/$OWNER" --jq '.created_at')
          STARS=$(gh api --paginate "/users/$OWNER/repos?per_page=100" --jq '[.[].stargazers_count] | add')
          YEARS=$(( ( $(date -u +%s) - $(date -u -d "$CREATED" +%s) ) / (365*86400) ))
          echo "followers=$FOLLOWERS  stars=$STARS  years=$YEARS  (created $CREATED)"
          {
            echo "FOLLOWERS=$FOLLOWERS"
            echo "STARS=$STARS"
            echo "YEARS=$YEARS"
          } >> "$GITHUB_ENV"

      - name: Rewrite marker-delimited sections in README
        run: |
          set -euo pipefail
          update_marker() {
            local marker="$1" value="$2"
            sed -i -E "s|(<!-- STATS:${marker} -->)[^<]*(<!-- /STATS:${marker} -->)|\1${value}\2|g" README.md
          }
          update_marker FOLLOWERS "$FOLLOWERS"
          update_marker STARS     "$STARS"
          update_marker YEARS     "$YEARS"
          git --no-pager diff README.md || true

      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet README.md; then
            echo "No stat changes, skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update README stats"
          git push
